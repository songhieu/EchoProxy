{{- if .Values.ingress.ingestApi.enabled }}
---
# Ingest API ingress — only enable if SDKs ingest from outside the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingest-api
  labels:
    {{- include "echoproxy.componentLabels" (dict "Chart" .Chart "Release" .Release "component" "ingest-api") | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.ingestApi.tls }}
  tls:
    - hosts: [{{ .Values.ingress.ingestApi.host | quote }}]
      secretName: {{ $name }}-ingest-api-tls
  {{- end }}
  rules:
    - host: {{ .Values.ingress.ingestApi.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $name }}-ingest-api
                port:
                  name: http
{{- end }}
{{- end }}
