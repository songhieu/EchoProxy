name: echoproxy

x-go-build: &go-build
  context: .
  dockerfile: deploy/Dockerfile.go

services:
  # ─── Infra ──────────────────────────────────────────────────────────────────
  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      # 24h retention: events flow to ClickHouse via log-consumer, the Kafka
      # log is only a replay buffer. See docs/retention.md.
      KAFKA_LOG_RETENTION_HOURS: "24"
      CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw
    ports: ["9092:9092"]
    volumes: [kafka-data:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      retries: 15
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_USER: echoproxy
      CLICKHOUSE_PASSWORD: echoproxy
      CLICKHOUSE_DB: echoproxy
    ports: ["8123:8123", "9000:9000"]
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d
      - ./deploy/clickhouse-listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8123/ping >/dev/null || exit 1"]
      interval: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echoproxy
      POSTGRES_PASSWORD: echoproxy
      POSTGRES_DB: echoproxy
    ports: ["5433:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "echoproxy"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    volumes: [redis-data:/data]

  # Mock upstream for benchmarks/dev
  upstream-mock:
    build:
      context: ./proxy-gateway/bench/mock-upstream
      dockerfile: Dockerfile
    ports: ["9001:9000"]

  # ─── Go services ────────────────────────────────────────────────────────────
  proxy-gateway:
    build:
      <<: *go-build
      args:
        SERVICE: proxy-gateway
        BIN: proxy
    environment:
      LISTEN_ADDR: ":8080"
      ADMIN_ADDR: ":6060"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: http_events
      POSTGRES_DSN: postgres://echoproxy:echoproxy@postgres:5432/echoproxy?sslmode=disable
      REDIS_ADDR: redis:6379
      BODY_CAP_BYTES: "65536"
      EVENT_CHAN_SIZE: "100000"
      KAFKA_WORKERS: "8"
      ALLOW_PRIVATE_TARGETS: "true"
      APIKEY_REFRESH_SECONDS: "3"
    ports: ["8080:8080", "6060:6060"]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

  ingest-api:
    build:
      <<: *go-build
      args:
        SERVICE: ingest-api
        BIN: ingest
    environment:
      HTTP_ADDR: ":8081"
      GRPC_ADDR: ":8082"
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: http_events
      POSTGRES_DSN: postgres://echoproxy:echoproxy@postgres:5432/echoproxy?sslmode=disable
      REDIS_ADDR: redis:6379
    ports: ["8081:8081", "8082:8082"]
    depends_on:
      kafka: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

  log-consumer:
    build:
      <<: *go-build
      args:
        SERVICE: log-consumer
        BIN: consumer
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: http_events
      KAFKA_GROUP: log-consumer
      CLICKHOUSE_DSN: clickhouse://echoproxy:echoproxy@clickhouse:9000/echoproxy
      BATCH_SIZE: "1000"
      BATCH_INTERVAL_MS: "1000"
    depends_on:
      kafka: {condition: service_healthy}
      clickhouse: {condition: service_healthy}

  auth-api:
    build:
      <<: *go-build
      args:
        SERVICE: auth-api
        BIN: auth
    environment:
      HTTP_ADDR: ":8083"
      POSTGRES_DSN: postgres://echoproxy:echoproxy@postgres:5432/echoproxy?sslmode=disable
      JWT_SECRET: dev_secret_change_me_in_prod_minimum_32_chars
    ports: ["8083:8083"]
    depends_on:
      postgres: {condition: service_healthy}

  stats-api:
    build:
      <<: *go-build
      args:
        SERVICE: stats-api
        BIN: stats
    environment:
      HTTP_ADDR: ":8084"
      CLICKHOUSE_DSN: clickhouse://echoproxy:echoproxy@clickhouse:9000/echoproxy
      POSTGRES_DSN: postgres://echoproxy:echoproxy@postgres:5432/echoproxy?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: dev_secret_change_me_in_prod_minimum_32_chars
    ports: ["8084:8084"]
    depends_on:
      clickhouse: {condition: service_healthy}
      postgres: {condition: service_healthy}
      redis: {condition: service_started}

  # ─── Cleanup ────────────────────────────────────────────────────────────────
  # Nightly retention sweep. Same image works one-shot (k8s CronJob,
  # systemd timer) or looped (this docker-compose use). INTERVAL=24h means:
  # run once at start, then every 24h.
  cleanup:
    build:
      <<: *go-build
      args:
        SERVICE: cleanup
        BIN: cleanup
    environment:
      POSTGRES_DSN: postgres://echoproxy:echoproxy@postgres:5432/echoproxy?sslmode=disable
      CLICKHOUSE_DSN: clickhouse://echoproxy:echoproxy@clickhouse:9000/echoproxy
      AUDIT_RETENTION_DAYS: "90"
      INTERVAL: "24h"
    depends_on:
      postgres: {condition: service_healthy}
      clickhouse: {condition: service_healthy}
    restart: unless-stopped

  # ─── Dashboard ──────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      AUTH_API_URL: http://auth-api:8083
      STATS_API_URL: http://stats-api:8084
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev_nextauth_secret_change_me_in_prod_minimum_32_chars
    ports: ["3000:3000"]
    depends_on:
      - auth-api
      - stats-api

  # ─── Observability ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    volumes: [./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro]
    ports: ["9090:9090"]

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/grafana:/etc/grafana/provisioning
    ports: ["3001:3000"]

volumes:
  kafka-data:
  clickhouse-data:
  postgres-data:
  redis-data:
  grafana-data:
